<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import Wizard - ICR</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="wizard-header">
      <h1 class="wizard-title">Import Leads</h1>
      <div class="stepper" id="stepper"></div>
      <button class="help-btn" title="Help"><i class="fas fa-question-circle"></i> Help</button>
    </header>

    <!-- Progress Bar -->
    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Wizard Content Area -->
    <main class="wizard-content" id="wizardContent"></main>

    <!-- Footer -->
    <footer class="wizard-footer" id="wizardFooter">
      <div class="footer-left">
        <a href="#" class="migrate-link" id="migrateLink">Migrate from other CRM?</a>
      </div>
      <div class="footer-right">
        <button class="btn btn-outline" id="btnCancel">Cancel</button>
        <button class="btn btn-outline" id="btnPrevious" style="display:none;">Previous</button>
        <button class="btn btn-primary" id="btnNext">Next</button>
      </div>
    </footer>
  </div>

  <!-- Toast Notification -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <script src="js/mockData.js"></script>
  <script src="js/stepper.js"></script>
  <script src="js/uploadPage.js"></script>
  <script src="js/actionsPage.js"></script>
  <script src="js/fieldMappingPage.js"></script>
  <script src="js/sampleExtractionPage.js"></script>
  <script src="js/assignPage.js"></script>
  <script src="js/approvalView.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
